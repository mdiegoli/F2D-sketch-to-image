<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F2D Sketch to 3D Image - Three.js</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }

        #container {
            display: flex;
            height: 100vh;
        }

        #sketchPanel {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            background: #2a2a2a;
            border-right: 2px solid #444;
            padding: 20px;
        }

        #sketchPanel h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        #sketchCanvas {
            flex: 1;
            border: 2px solid #555;
            background: white;
            cursor: crosshair;
            margin-bottom: 10px;
        }

        #controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 15px;
            background: #00aa44;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #00cc55;
        }

        button:active {
            background: #008833;
        }

        #renderPanel {
            flex: 1;
            position: relative;
            background: #1a1a1a;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        .info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 300px;
        }

        .instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="sketchPanel">
            <h2>2D Sketch</h2>
            <canvas id="sketchCanvas"></canvas>
            <div id="controls">
                <button id="generateBtn">Generate 3D</button>
                <button id="clearBtn">Clear</button>
                <button id="undoBtn">Undo</button>
            </div>
            <p style="margin-top: 10px; font-size: 12px; color: #aaa;">
                Left-click to draw | Shift+click to delete point
            </p>
        </div>
        <div id="renderPanel">
            <div class="info">
                <strong>3D View</strong><br>
                Right-click + drag: Pan<br>
                Scroll: Zoom<br>
                Auto-rotating
            </div>
            <div class="instructions">
                Draw a path on the left, then click "Generate 3D" to extrude it!
            </div>
        </div>
    </div>

    <script src="js/sketch-3d.js"></script>
</body>
</html>
